name: Afternoon Quiz (1:00 PM IST)

on:
  schedule:
    # 1:00 PM IST = 7:30 AM UTC
    - cron: "30 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-afternoon-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send afternoon quiz
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python send_quiz.py afternoon

      - name: Commit updated database
        run: |
          git config user.name "ssc-cgl-bot"
          git config user.email "actions@users.noreply.github.com"
          git add database.db
          git diff --quiet --cached || git commit -m "chore: update database after afternoon quiz [skip ci]"
          git push